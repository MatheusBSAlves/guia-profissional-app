<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" role="img" aria-label="Ilustração de gerador de currículo com formulário e pré-visualização em tempo real">
  <defs>
    <linearGradient id="cbg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#E0ECFF"/><stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
  </defs>
  <rect width="480" height="320" rx="20" fill="url(#cbg)"/>
  <circle cx="430" cy="50" r="30" fill="#FACC15" opacity=".5"/>
  <!-- Form panel -->
  <g transform="translate(40 50)">
    <rect width="180" height="220" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
    <rect x="16" y="20" width="80" height="8" rx="3" fill="#102A43"/>
    <rect x="16" y="40" width="148" height="22" rx="5" fill="#F8FAFC" stroke="#E2E8F0"/>
    <rect x="16" y="70" width="148" height="22" rx="5" fill="#F8FAFC" stroke="#E2E8F0"/>
    <rect x="16" y="100" width="148" height="22" rx="5" fill="#F8FAFC" stroke="#2563EB"/>
    <rect x="16" y="130" width="148" height="50" rx="5" fill="#F8FAFC" stroke="#E2E8F0"/>
    <rect x="16" y="190" width="70" height="20" rx="5" fill="#2563EB"/>
  </g>
  <!-- Arrow live preview -->
  <g transform="translate(230 150)" fill="#2563EB">
    <path d="M0 8 h20 v-6 l12 12 l-12 12 v-6 h-20z"/>
  </g>
  <!-- Preview paper -->
  <g transform="translate(280 40)">
    <rect width="170" height="240" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
    <rect x="14" y="16" width="80" height="10" rx="3" fill="#102A43"/>
    <rect x="14" y="32" width="60" height="6" rx="3" fill="#2563EB"/>
    <rect x="14" y="48" width="142" height="2" fill="#2563EB"/>
    <rect x="14" y="60" width="40" height="6" rx="3" fill="#64748B"/>
    <rect x="14" y="72" width="120" height="4" rx="2" fill="#E2E8F0"/>
    <rect x="14" y="80" width="110" height="4" rx="2" fill="#E2E8F0"/>
    <rect x="14" y="100" width="40" height="6" rx="3" fill="#102A43"/>
    <rect x="14" y="112" width="130" height="4" rx="2" fill="#E2E8F0"/>
    <rect x="14" y="120" width="100" height="4" rx="2" fill="#E2E8F0"/>
    <rect x="14" y="142" width="40" height="6" rx="3" fill="#102A43"/>
    <g transform="translate(14 156)">
      <rect width="38" height="14" rx="7" fill="#E6EDFF"/>
      <rect x="42" width="46" height="14" rx="7" fill="#E6EDFF"/>
      <rect x="92" width="34" height="14" rx="7" fill="#E6EDFF"/>
    </g>
    <!-- PDF icon -->
    <g transform="translate(120 196)">
      <rect width="36" height="30" rx="4" fill="#16A34A"/>
      <text x="18" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">PDF</text>
    </g>
  </g>
</svg>