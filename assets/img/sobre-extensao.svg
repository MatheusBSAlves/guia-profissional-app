<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" role="img" aria-label="Ilustração de estudantes trabalhando em equipe em projeto digital para apoiar a comunidade">
  <defs>
    <linearGradient id="sbg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#E0ECFF"/><stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
  </defs>
  <rect width="480" height="320" rx="20" fill="url(#sbg)"/>
  <circle cx="70" cy="60" r="30" fill="#FACC15" opacity=".45"/>
  <circle cx="420" cy="260" r="46" fill="#38BDF8" opacity=".3"/>
  <!-- Shared screen -->
  <g transform="translate(150 80)">
    <rect width="180" height="120" rx="10" fill="#102A43"/>
    <rect x="10" y="10" width="160" height="92" rx="6" fill="#FFFFFF"/>
    <rect x="22" y="24" width="60" height="8" rx="3" fill="#2563EB"/>
    <rect x="22" y="40" width="120" height="6" rx="3" fill="#E2E8F0"/>
    <rect x="22" y="54" width="100" height="6" rx="3" fill="#E2E8F0"/>
    <rect x="22" y="74" width="40" height="18" rx="4" fill="#16A34A"/>
    <rect x="68" y="74" width="40" height="18" rx="4" fill="#E6EDFF"/>
    <rect x="60" y="108" width="60" height="6" rx="3" fill="#102A43" opacity=".4"/>
  </g>
  <!-- Person 1 -->
  <g transform="translate(60 170)">
    <circle cx="30" cy="30" r="22" fill="#F2C29A"/>
    <path d="M10 26 q20 -28 40 0 q-4 -18 -20 -18 q-16 0 -20 18z" fill="#102A43"/>
    <path d="M0 100 q30 -60 60 0z" fill="#2563EB"/>
  </g>
  <!-- Person 2 -->
  <g transform="translate(380 170)">
    <circle cx="30" cy="30" r="22" fill="#E5B58A"/>
    <path d="M8 30 q22 -22 44 0 q-4 -22 -22 -22 q-18 0 -22 22z" fill="#16A34A"/>
    <path d="M0 100 q30 -60 60 0z" fill="#38BDF8"/>
  </g>
  <!-- Heart of community -->
  <g transform="translate(220 230)">
    <path d="M20 32 l-14 -12 a8 8 0 0 1 14 -10 a8 8 0 0 1 14 10z" fill="#FACC15"/>
  </g>
</svg>