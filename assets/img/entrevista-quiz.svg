<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" role="img" aria-label="Ilustração de questionário de perfil para entrevista com perguntas, barra de progresso e checklist">
  <defs>
    <linearGradient id="qbg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#E0ECFF"/><stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
  </defs>
  <rect width="480" height="320" rx="20" fill="url(#qbg)"/>
  <circle cx="60" cy="60" r="36" fill="#FACC15" opacity=".45"/>
  <circle cx="420" cy="270" r="44" fill="#38BDF8" opacity=".3"/>
  <!-- Quiz card -->
  <g transform="translate(60 60)">
    <rect width="240" height="220" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
    <rect x="20" y="24" width="120" height="8" rx="4" fill="#102A43"/>
    <rect x="20" y="44" width="200" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="20" y="44" width="120" height="8" rx="4" fill="#2563EB"/>
    <g>
      <rect x="20" y="74" width="200" height="34" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
      <circle cx="36" cy="91" r="7" fill="#2563EB"/>
      <rect x="52" y="86" width="120" height="10" rx="3" fill="#102A43" opacity=".7"/>
    </g>
    <g>
      <rect x="20" y="118" width="200" height="34" rx="8" fill="#E6EDFF" stroke="#2563EB"/>
      <circle cx="36" cy="135" r="7" fill="#2563EB"/>
      <circle cx="36" cy="135" r="3" fill="#FFFFFF"/>
      <rect x="52" y="130" width="140" height="10" rx="3" fill="#102A43"/>
    </g>
    <g>
      <rect x="20" y="162" width="200" height="34" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
      <circle cx="36" cy="179" r="7" fill="#CBD5E1"/>
      <rect x="52" y="174" width="100" height="10" rx="3" fill="#102A43" opacity=".55"/>
    </g>
  </g>
  <!-- Profile bubble -->
  <g transform="translate(330 70)">
    <circle cx="50" cy="50" r="50" fill="#FFFFFF" stroke="#E2E8F0"/>
    <circle cx="50" cy="40" r="16" fill="#2563EB"/>
    <path d="M22 78 q28 -34 56 0z" fill="#2563EB"/>
  </g>
  <!-- Checkmark badge -->
  <g transform="translate(340 190)">
    <circle cx="34" cy="34" r="30" fill="#16A34A"/>
    <path d="M22 35 l9 9 l17 -19" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>