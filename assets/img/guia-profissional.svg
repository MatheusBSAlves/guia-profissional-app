<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" role="img" aria-label="Ilustração de guia profissional com livro aberto, lâmpada de ideia e checklist">
  <defs>
    <linearGradient id="gbg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#E0ECFF"/><stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
  </defs>
  <rect width="480" height="320" rx="20" fill="url(#gbg)"/>
  <!-- Book -->
  <g transform="translate(80 110)">
    <path d="M0 0 q80 -30 150 0 v140 q-70 -28 -150 0z" fill="#FFFFFF" stroke="#E2E8F0"/>
    <path d="M300 0 q-80 -30 -150 0 v140 q70 -28 150 0z" fill="#FFFFFF" stroke="#E2E8F0"/>
    <line x1="150" y1="0" x2="150" y2="140" stroke="#2563EB" stroke-width="2"/>
    <g stroke="#102A43" stroke-width="2" opacity=".55">
      <line x1="20" y1="30" x2="130" y2="14"/>
      <line x1="20" y1="50" x2="120" y2="34"/>
      <line x1="20" y1="70" x2="125" y2="54"/>
      <line x1="170" y1="14" x2="280" y2="30"/>
      <line x1="170" y1="34" x2="270" y2="50"/>
      <line x1="170" y1="54" x2="275" y2="70"/>
    </g>
  </g>
  <!-- Lightbulb -->
  <g transform="translate(350 50)">
    <circle cx="30" cy="34" r="28" fill="#FACC15"/>
    <rect x="20" y="62" width="20" height="8" rx="2" fill="#102A43"/>
    <rect x="22" y="72" width="16" height="6" rx="2" fill="#102A43"/>
    <g stroke="#FACC15" stroke-width="3" stroke-linecap="round">
      <line x1="30" y1="-2" x2="30" y2="6"/>
      <line x1="-2" y1="34" x2="6" y2="34"/>
      <line x1="62" y1="34" x2="54" y2="34"/>
      <line x1="6" y1="10" x2="12" y2="16"/>
      <line x1="54" y1="10" x2="48" y2="16"/>
    </g>
  </g>
  <!-- Arrow growth -->
  <g transform="translate(330 200)" fill="none" stroke="#16A34A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="0,60 25,40 45,50 75,18"/>
    <polygon points="65,12 82,12 80,30" fill="#16A34A" stroke="none"/>
  </g>
  <circle cx="60" cy="70" r="20" fill="#38BDF8" opacity=".4"/>
</svg>